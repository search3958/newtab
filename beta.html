<script>
  

  // ============================================================
// inline.js — ページ内 <script> に埋め込む最小限のコード
// 責務: 壁紙表示 / フォーカス管理 / 検索実行と計算 / beta.js の遅延ロード
// ============================================================

// ---------- IndexedDB ヘルパー ----------
let dbInstance = null;
let dbPromise = null;

async function getDB() {
  if (dbInstance) return dbInstance;
  if (dbPromise) return dbPromise;
  dbPromise = new Promise((resolve, reject) => {
    const request = indexedDB.open('WallpaperDB', 1);
    request.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('images')) {
        db.createObjectStore('images');
      }
    };
    request.onsuccess = (e) => {
      dbInstance = e.target.result;
      dbPromise = null;
      resolve(dbInstance);
    };
    request.onerror = () => {
      dbPromise = null;
      reject(new Error('IndexedDB open failed'));
    };
  });
  return dbPromise;
}

async function _idbGet(db, key) {
  return new Promise((resolve) => {
    const req = db.transaction(['images'], 'readonly').objectStore('images').get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror  = () => resolve(null);
  });
}

async function getMultipleWallpaperData(keys) {
  try {
    const db = await getDB();
    return Promise.all(keys.map(key =>
      _idbGet(db, key).then(data => ({ key, data }))
    ));
  } catch {
    return keys.map(key => ({ key, data: null }));
  }
}

// ---------- 壁紙適用 ----------
function applyWallpaper(lightBlob, darkBlob = null) {
  ['lightUrl', 'darkUrl'].forEach(key => {
    const old = document.body.dataset[key];
    if (old && old.startsWith('blob:')) URL.revokeObjectURL(old);
  });
  const lightUrl = lightBlob ? URL.createObjectURL(lightBlob) : 'bgimg/samag2.webp';
  const darkUrl  = darkBlob  ? URL.createObjectURL(darkBlob)  :
                   lightBlob ? lightUrl : 'bgimg/samag2_dark.webp';
  const s = document.body.style;
  s.setProperty('--user-wallpaper-light', `url('${lightUrl}')`);
  s.setProperty('--user-wallpaper-dark',  `url('${darkUrl}')`);
  document.body.dataset.lightUrl = lightUrl;
  document.body.dataset.darkUrl  = darkUrl;
}

async function initWallpaper() {
  const results = await getMultipleWallpaperData(['newtab', 'light', 'dark']);
  const map = Object.fromEntries(results.map(r => [r.key, r.data]));
  if (map.newtab?.light) {
    applyWallpaper(map.newtab.light, map.newtab.dark);
  } else if (map.light?.light || map.dark?.dark) {
    applyWallpaper(map.light?.light, map.dark?.dark);
  } else {
    applyWallpaper(null, null);
  }
}

// ---------- フォーカス管理 ----------
function ensureFocus() {
  const selectors = ['.search-input', '#your-textbox-id', 'input[type="text"]', 'input[type="search"]'];
  let target = null;
  for (const sel of selectors) {
    target = document.querySelector(sel);
    if (target) break;
  }
  if (!target) return null;
  const setFocus = () => { if (document.activeElement !== target) target.focus({ preventScroll: true }); };
  setFocus();
  requestAnimationFrame(() => { setFocus(); requestAnimationFrame(setFocus); });
  return target;
}

// ---------- 検索・計算ユーティリティ (スコープ内に閉じて _inlineUtils のみ公開) ----------
(function() {
  var RE_FULL_WIDTH = /[０-９]/g;
  var RE_MUL       = /[×✖️xX]/g;
  var RE_DIV       = /[÷➗]/g;
  var RE_MINUS     = /[ー]/g;
  var RE_PLUS      = /[＋]/g;
  var RE_INVALID   = /[^0-9+\-*/().\s]/g;
  var RE_TRAIL_OPS = /[\s+\-*/().]*$/;
  var RE_MATH      = /^[\d\s+\-*/().]+$/;
  var RE_OPERATOR  = /[+\-*/]/;
  var RE_URL       = /^(https?:\/\/|(([a-z0-9-]+\.)+[a-z]{2,}))/i;

  function sanitizeExpr(expr) {
    return expr
      .replace(RE_FULL_WIDTH, function(s) { return String.fromCharCode(s.charCodeAt(0) - 0xFEE0); })
      .replace(RE_MUL, '*').replace(RE_DIV, '/').replace(RE_MINUS, '-')
      .replace(RE_PLUS, '+').replace(RE_INVALID, '');
  }

  function isMath(str) {
    if (!str) return false;
    var s = sanitizeExpr(str);
    var check = s.replace(RE_TRAIL_OPS, '');
    return RE_MATH.test(s) && RE_OPERATOR.test(check);
  }

  function calcResult(expr) {
    var s = sanitizeExpr(expr).replace(RE_TRAIL_OPS, '');
    try {
      var r = Function('"use strict";return(' + s + ')')();
      return (typeof r === 'number' && isFinite(r) && !isNaN(r)) ? r : null;
    } catch(e) { return null; }
  }

  window._inlineUtils = { sanitizeExpr: sanitizeExpr, isMath: isMath, calcResult: calcResult, RE_URL: RE_URL };
})();

// ---------- beta.js 遅延ロード ----------
function loadDeferredScript(focusTarget) {
  const load = () => {
    const script = document.createElement('script');
    script.src = 'beta.js';
    script.async = true;
    script.onload = () => {
      if (focusTarget && document.activeElement !== focusTarget)
        focusTarget.focus({ preventScroll: true });
    };
    script.onerror = () => console.error('[Main] Failed to load beta.js');
    document.body.appendChild(script);
  };
  'requestIdleCallback' in window
    ? requestIdleCallback(load, { timeout: 500 })
    : setTimeout(load, 150);
}

// ---------- Service Worker ----------
function registerSW() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('[SW] registered'))
      .catch(err => console.error('[SW] failed', err));
  }
}

// ---------- 初期化 ----------
(function init() {
  const start = () => {
    initWallpaper().catch(e => console.warn('[Main] Wallpaper init failed:', e));
    const focusTarget = ensureFocus();
    loadDeferredScript(focusTarget);
    if (focusTarget) {
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden && document.activeElement !== focusTarget)
          focusTarget.focus({ preventScroll: true });
      });
    }
  };
  document.readyState === 'loading'
    ? document.addEventListener('DOMContentLoaded', start, { once: true })
    : start();
})();

window.addEventListener('load', registerSW);

// ---------- グローバル公開 (beta.js / 外部から参照) ----------
window.reloadWallpaper = initWallpaper;
window.clearWallpaperCache = () => { dbInstance = null; dbPromise = null; };
</script>
